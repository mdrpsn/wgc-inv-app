{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="mb-3">
        <h1 class="h3">New Product</h1>
        <p class="text-muted">Create a SKU before adding stock.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">SKU</label>
                        <input type="text" name="sku" class="form-control" required>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" class="form-control">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Unit</label>
                        <input type="text" name="unit" class="form-control" value="pcs">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Cost Price</label>
                        <input type="number" name="cost_price" class="form-control" min="0" step="0.01" value="0">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Selling Price</label>
                        <input type="number" name="selling_price" class="form-control" min="0" step="0.01" value="0">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Reorder Level</label>
                        <input type="number" name="reorder_level" class="form-control" min="0" value="0">
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Save Product</button>
                    <a href="{{ url_for('products.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
