{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="mb-3">
        <h1 class="h3">New Location</h1>
        <p class="text-muted">Create a warehouse or branch location.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Location Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location Type</label>
                    <select name="location_type" class="form-select" required>
                        <option value="">Select type</option>
                        <option value="warehouse">Warehouse</option>
                        <option value="branch">Branch</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Location</button>
                    <a href="{{ url_for('locations.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
