{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="mb-3">
        <h1 class="h3">New Supplier</h1>
        <p class="text-muted">Create a supplier for purchase orders.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Supplier Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Contact Person</label>
                        <input type="text" name="contact_person" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Lead Time Days</label>
                        <input type="number" name="lead_time_days" class="form-control" min="0" value="0">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Payment Terms</label>
                        <input type="text" name="payment_terms" class="form-control" placeholder="Cash, COD, Net 15, Net 30">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Save Supplier</button>
                    <a href="{{ url_for('suppliers.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
